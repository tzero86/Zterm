name: Populate Build Cache (DISABLED - Warp-specific infra)
# DISABLED: Depends on Warp-owned actions and causes startup failures.
# Build caching is nice-to-have but not essential; CI still works without it.
# See DISABLED_WARP_WORKFLOWS.md for details.
on:
  workflow_dispatch:
    inputs:
      _disabled:
        description: "This workflow is disabled"
        required: false
        type: string

jobs:
  populate_build_cache:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit
