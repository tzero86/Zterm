[env]
# This is used to set the minimum deployment target for mac
# https://cmake.org/cmake/help/latest/envvar/MACOSX_DEPLOYMENT_TARGET.html
# If unset, it uses the system one, but we want to build for older versions
# of mac os by default.
#
# This should be kept in sync with the definition of this variable in
# `script/bundle`.
MACOSX_DEPLOYMENT_TARGET = "10.14"

# Protocol Buffers compiler - required by remote_server and warp-proto-apis build scripts.
# Update this path if protoc is installed elsewhere on your system.
# On Windows: installed via `winget install Google.Protobuf`
PROTOC = { value = "C:\\Users\\Zero\\AppData\\Local\\Microsoft\\WinGet\\Packages\\Google.Protobuf_Microsoft.Winget.Source_8wekyb3d8bbwe\\bin\\protoc.exe", force = false }

[build]
rustflags = ["-C", "symbol-mangling-version=v0", "-C", "link-args=-Wl,-headerpad_max_install_names"]

[net]
git-fetch-with-cli = true

[target.'cfg(target_family = "wasm")']
rustflags = ["--cfg=web_sys_unstable_apis"]
